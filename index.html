<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyHouse Cozy Cinema</title>
    
    <!-- PeerJS للمكالمات الصوتية المباشرة -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- مكتبة Lucide للأيقونات العصرية -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- مكتبة SDK الرسمية لبايبال -->
    <script src="https://www.paypal.com/sdk/js?client-id=AeWZjpjao8UB0DNcL_Ahgo-fWMx6nJIEeGnswxdoDfmAU3yFY6PSz5OALcU5PBXKHF37B7iX1p07zO-8&currency=USD"></script>

    <style>
        :root {
            --bg-dark: #05070f;
            --card-bg: rgba(13, 18, 33, 0.75);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #0066ff;
            --accent-hover: #0052cc;
            --danger-red: #ef4444;
            --danger-hover: #dc2626;
            --success-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            --text-secondary: #9ca3af;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow-y: auto;
            background-image: radial-gradient(circle at 50% -20%, #111e3b 0%, #05070f 70%);
        }

        /* حاوية التنبيهات */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 420px; 
            padding: 35px 28px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center; 
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 20px 0;
        }
        
        .container.app-expanded {
            max-width: 650px; 
        }
        
        h1 { 
            font-size: 22px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: var(--text-main); 
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .avatar-picker { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            margin: 0 auto 24px; 
            cursor: pointer; 
        }
        .avatar-picker img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--accent-blue); 
        }
        .avatar-picker input { display: none; }
        .avatar-overlay { 
            position: absolute; 
            bottom: 2px; 
            right: 2px; 
            background: var(--accent-blue); 
            padding: 7px; 
            border-radius: 50%; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 2px solid #0d1221;
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            color: white; 
            font-size: 15px; 
            margin-bottom: 20px; 
            outline: none; 
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: var(--accent-blue);
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent-blue); 
            border: none; 
            border-radius: 14px; 
            color: white; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover { 
            background: var(--accent-hover); 
        }
        
        #app-screen { display: none; }

        .my-code-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .my-code-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .my-code-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 3px;
        }

        .partner-found-card {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            margin-top: 15px;
            align-items: center;
            justify-content: space-between;
        }
        .partner-found-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .partner-found-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }
        .partner-found-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-mini {
            width: auto;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 8px;
        }
        .btn-mini-cancel { background: #1f2937; }

        /* صندوق التبرعات */
        .support-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px;
            margin-top: 25px;
            text-align: center;
        }
        .support-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .support-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            line-height: 1.5;
        }
        .presets-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn-preset {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: auto;
            transition: all 0.2s ease;
        }
        .btn-preset:hover, .btn-preset.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        .custom-donation-wrapper {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 4px 12px;
        }
        .custom-donation-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 13px;
            font-weight: 600;
            width: 100%;
            text-align: right;
            padding: 6px;
            margin-bottom: 0 !important;
        }
        .custom-donation-wrapper span {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
            padding-right: 4px;
        }

        /* شاشة المكالمة والسينما */
        #call-screen { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #030408; 
            z-index: 100; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px;
            overflow-y: auto;
        }

        .calling-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        /* غرفة السينما والتحكم */
        .cinema-room {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            border: 1px solid var(--card-border);
            margin-top: 10px;
        }

        #video-container {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        #player {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        /* حقل الرابط والبحث */
        .video-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: #080c14;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .search-row {
            display: flex;
            gap: 8px;
        }
        .search-row input {
            flex: 1;
            padding: 10px;
            background: #03050a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            margin-bottom: 0;
            text-align: right;
        }
        .search-row button {
            width: auto;
            padding: 10px 16px;
            font-size: 13px;
            border-radius: 8px;
        }

        /* الشات المتكامل أسفل الفيديو */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 220px;
            background: #060913;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-msg {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            animation: slideUpFade 0.2s ease;
        }
        .chat-msg img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-msg-body {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 6px 10px;
            border-radius: 12px;
            max-width: 80%;
            word-break: break-all;
        }
        .chat-msg-name {
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 2px;
        }
        .chat-input-row {
            display: flex;
            padding: 8px;
            background: #04060c;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .chat-input-row input {
            flex: 1;
            padding: 10px;
            background: #080c14;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            margin-bottom: 0;
            text-align: right;
        }
        .chat-input-row button {
            width: auto;
            padding: 10px 16px;
            border-radius: 8px;
            margin-right: 8px;
        }

        /* أزرار التحكم في المكالمة */
        .controls { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            width: 100%; 
            padding: 10px 0;
        }
        .btn-control { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            cursor: pointer; 
            color: white;
        }
        .btn-mute { background: #1f2937; }
        .btn-mute.active { background: var(--danger-red); }
        .btn-hangup { background: var(--danger-red); }
        .btn-accept { 
            background: var(--success-green); 
            border-radius: 24px; 
            width: auto; 
            padding: 0 16px; 
            font-size: 13px; 
            gap: 6px;
        }

        .optima-footer {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .optima-brand {
            color: var(--accent-blue);
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .cinema-room {
                margin-top: 5px;
            }
            .chat-container {
                height: 160px;
            }
        }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div class="container" id="main-container">
        <!-- 1. شاشة الدخول -->
        <div id="login-screen">
            <h1>انضم إلى MyHouse Cinema</h1>
            <p class="subtitle">تواصل بالصوت وشاهد فيديوهات يوتيوب بالتزامن</p>
            <div class="avatar-picker" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="Avatar">
                <div class="avatar-overlay"><i data-lucide="camera"></i></div>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <input type="text" id="username" placeholder="اكتب اسمك المستعار..." autocomplete="off" maxlength="15">
            <button id="btn-join"><i data-lucide="log-in"></i>دخول الآن</button>
            
            <!-- صندوق التبرعات -->
            <div class="support-card">
                <div class="support-title">
                    <i data-lucide="heart" style="color: var(--danger-red); fill: var(--danger-red); width: 16px; height: 16px;"></i>
                    <span>ادعم مطوري Optima Code</span>
                </div>
                <div class="support-desc">تبرعك يساهم في تطوير مشاريعنا البرمجية المفتوحة المصدر.</div>
                <div class="presets-container">
                    <button class="btn-preset active" data-val="3.00">$3</button>
                    <button class="btn-preset" data-val="5.00">$5</button>
                    <button class="btn-preset" data-val="10.00">$10</button>
                    <button class="btn-preset" id="btn-custom-toggle" data-val="custom">مبلغ آخر</button>
                </div>

                <div class="custom-donation-wrapper" id="custom-donation-box" style="display: none;">
                    <input type="text" id="custom-amount-input" placeholder="اكتب المبلغ..." maxlength="6">
                    <span>USD $</span>
                </div>

                <div id="paypal-button-container"></div>
            </div>

            <div class="optima-footer">الموقع مصمم من طرف <span class="optima-brand">Optima Code</span></div>
        </div>

        <!-- 2. شاشة البحث والاتصال -->
        <div id="app-screen">
            <h1>غرفتك الخاصة 🔑</h1>
            <div class="my-code-panel">
                <div class="my-code-title">رمز الاتصال الخاص بك</div>
                <div class="my-code-value" id="my-6digit-code">------</div>
            </div>

            <input type="text" id="target-code-input" placeholder="000 000" maxlength="7" autocomplete="off">
            <button id="btn-search-by-code"><i data-lucide="search"></i>بحث عن الرمز</button>

            <div class="partner-found-card" id="partner-found-card">
                <div class="partner-found-info">
                    <img class="partner-found-avatar" id="found-avatar" src="" alt="">
                    <div>
                        <div id="found-name">اسم الصديق</div>
                    </div>
                </div>
                <div class="partner-found-buttons">
                    <button class="btn-mini btn-mini-cancel" id="btn-cancel-search">إلغاء</button>
                    <button class="btn-mini" id="btn-start-actual-call" style="background: var(--success-green);">اتصال</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. شاشة السينما والمكالمة -->
    <div id="call-screen">
        <div class="calling-state-container" id="calling-state-view">
            <h3 id="call-user-name">اسم الطرف الآخر</h3>
            <p id="call-status-text">جاري الاتصال الصوتي وصنع السينما...</p>
        </div>

        <!-- السينما بالتكامل التام -->
        <div class="cinema-room" id="cinema-room">
            <!-- الفيديو مستقل بنسبة عرض 16:9 -->
            <div id="video-container">
                <div id="player"></div>
            </div>

            <!-- حقل الرابط والبحث المباشر -->
            <div class="video-selector">
                <div class="search-row">
                    <input type="text" id="video-url" placeholder="ألصق رابط فيديو أو اكتب للبحث على يوتيوب...">
                    <button id="btn-load-video">بحث / تشغيل</button>
                </div>
            </div>

            <!-- الشات الجديد أسفل شاشة السينما -->
            <div class="chat-container">
                <div class="chat-messages" id="chat-box"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="اكتب رسالة هنا للغرفة...">
                    <button id="btn-send-msg" style="background: var(--accent-blue);">إرسال</button>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-mute" class="btn-control btn-mute"><i data-lucide="mic"></i></button>
            <button id="btn-accept" class="btn-control btn-accept" style="display: none;"><i data-lucide="phone"></i>قبول</button>
            <button id="btn-hangup" class="btn-control btn-hangup"><i data-lucide="phone-off"></i></button>
        </div>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, remove, get, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, myAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=default";
        let my6DigitCode = "";
        let peer, localStream, currentCall, partnerId = null;
        let ytPlayer = null;
        let ignoreNextStateChange = false; 
        let lastActionSent = null;
        let searchedPartner = null; 
        let callRejectedListener = null;
        let donationAmount = "3.00"; 

        lucide.createIcons();

        function sanitizeInput(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(m) {
                switch (m) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    case "'": return '&#x27;';
                    default: return m;
                }
            }).trim();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            let iconName = 'info';
            if (type === 'success') iconName = 'check-circle';
            if (type === 'danger') iconName = 'alert-triangle';
            toast.innerHTML = `<i data-lucide="${iconName}"></i><span>${sanitizeInput(message)}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.remove(); }, 3000);
        }

        // إعدادات مبالغ التبرع
        const presetButtons = document.querySelectorAll('.btn-preset');
        const customDonationBox = document.getElementById('custom-donation-box');
        const customAmountInput = document.getElementById('custom-amount-input');

        presetButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                presetButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const val = e.target.getAttribute('data-val');
                if (val === 'custom') {
                    customDonationBox.style.display = 'flex';
                    customAmountInput.focus();
                    const inputVal = parseFloat(customAmountInput.value);
                    donationAmount = (!isNaN(inputVal) && inputVal > 0) ? inputVal.toFixed(2) : "1.00";
                } else {
                    customDonationBox.style.display = 'none';
                    donationAmount = val;
                }
            });
        });

        customAmountInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9.]/g, '');
            const parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
            e.target.value = val;

            const parsedVal = parseFloat(val);
            donationAmount = (!isNaN(parsedVal) && parsedVal > 0) ? parsedVal.toFixed(2) : "1.00";
        });

        // رندر بايبال
        paypal.Buttons({
            style: { layout: 'vertical', color: 'gold', shape: 'rect', height: 40 },
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: donationAmount },
                        description: "Support Optima Code"
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    showToast(`شكراً جزيلاً لدعمك Optima Code! تم التبرع بنجاح من طرف: ${details.payer.name.given_name}`, "success");
                });
            },
            onError: function(err) {
                showToast("حدث خطأ في عملية الدفع.", "danger");
            }
        }).render('#paypal-button-container');

        // تجهيز كود الاتصال
        document.getElementById('target-code-input').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 3) val = val.slice(0, 3) + ' ' + val.slice(3, 6);
            e.target.value = val;
        });

        // تشغيل واجهة يوتيوب
        function loadYoutubeAPI() {
            if (!window.YT) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            } else {
                onYouTubeIframeAPIReady();
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '5qap5aO4i9A',
                playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1 },
                events: {
                    'onReady': (e) => { e.target.unMute(); },
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        // الدخول وإنشاء حساب
        document.getElementById('btn-join').addEventListener('click', async () => {
            myName = sanitizeInput(document.getElementById('username').value);
            if(!myName || myName.length < 2) return showToast("الرجاء كتابة اسم مستعار صالح!", "danger");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                showToast("يجب السماح بالوصول للمايكروفون للاتصال بالصوت!", "danger");
                return;
            }

            peer = new Peer({
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            
            peer.on('open', async (id) => {
                myId = id;
                my6DigitCode = Math.floor(100000 + Math.random() * 900000).toString();

                const userRef = ref(db, 'users/' + myId);
                const codeRef = ref(db, 'codes/' + my6DigitCode);

                await set(userRef, { name: myName, avatar: myAvatar, code: my6DigitCode });
                await set(codeRef, { peerId: myId, name: myName, avatar: myAvatar });

                onDisconnect(userRef).remove();
                onDisconnect(codeRef).remove();

                document.getElementById('my-6digit-code').innerText = my6DigitCode.slice(0, 3) + ' ' + my6DigitCode.slice(3, 6);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('main-container').classList.add('app-expanded');
                
                loadYoutubeAPI();
                listenForIncomingCalls();
            });
        });

        // البحث والاتصال
        document.getElementById('btn-search-by-code').addEventListener('click', async () => {
            const rawCode = document.getElementById('target-code-input').value.replace(/\s+/g, '');
            if (!/^\d{6}$/.test(rawCode)) return showToast("الرجاء إدخال كود صحيح!", "danger");
            if (rawCode === my6DigitCode) return showToast("لا يمكنك الاتصال بنفسك!", "danger");

            const codeSnapshot = await get(ref(db, 'codes/' + rawCode));
            if (!codeSnapshot.exists()) return showToast("الرمز غير موجود!", "danger");

            searchedPartner = codeSnapshot.val();
            document.getElementById('found-avatar').src = searchedPartner.avatar;
            document.getElementById('found-name').innerText = searchedPartner.name;
            document.getElementById('partner-found-card').style.display = 'flex';
        });

        document.getElementById('btn-start-actual-call').addEventListener('click', () => {
            if (!searchedPartner) return;
            document.getElementById('partner-found-card').style.display = 'none';
            startCall(searchedPartner.peerId, searchedPartner.name, searchedPartner.avatar);
        });

        function startCall(targetId, targetName, targetAvatar) {
            partnerId = targetId;
            document.getElementById('btn-accept').style.display = 'none';
            document.getElementById('cinema-room').style.display = 'none';
            document.getElementById('calling-state-view').style.display = 'flex';
            document.getElementById('call-screen').style.display = 'flex';

            currentCall = peer.call(targetId, localStream);
            handleCallStreams(currentCall);

            const rejectRef = ref(db, `calls/${myId}_${partnerId}/rejected`);
            set(rejectRef, false);
            
            callRejectedListener = onValue(rejectRef, (snapshot) => {
                if (snapshot.exists() && snapshot.val() === true) {
                    showToast("رفض الطرف الآخر الاتصال", "danger");
                    if(currentCall) currentCall.close();
                    endCallInterface();
                }
            });

            setupCinemaSync();
            setupChatSync();
        }

        function listenForIncomingCalls() {
            peer.on('call', (incomingCall) => {
                currentCall = incomingCall;
                partnerId = incomingCall.peer;
                
                onValue(ref(db, 'users/' + partnerId), (snapshot) => {
                    const caller = snapshot.val();
                    if (caller) {
                        document.getElementById('call-user-name').innerText = caller.name;
                    }
                }, { onlyOnce: true });

                document.getElementById('btn-accept').style.display = 'inline-flex';
                document.getElementById('cinema-room').style.display = 'none';
                document.getElementById('calling-state-view').style.display = 'flex';
                document.getElementById('call-screen').style.display = 'flex';

                document.getElementById('btn-accept').onclick = () => {
                    currentCall.answer(localStream);
                    document.getElementById('btn-accept').style.display = 'none';
                    handleCallStreams(currentCall);
                    setupCinemaSync();
                    setupChatSync();
                };
            });
        }

        // محرك البحث والتشغيل الذكي من يوتيوب
        document.getElementById('btn-load-video').addEventListener('click', () => {
            const query = sanitizeInput(document.getElementById('video-url').value);
            if (!query) return;

            const videoId = extractYouTubeId(query);
            if (videoId) {
                triggerVideoChange(videoId);
            } else {
                showToast("جاري البحث عن الفيديو المباشر...", "info");
                triggerVideoChange(query, true);
            }
        });

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function triggerVideoChange(val, isSearch = false) {
            if (!partnerId) return;
            let videoId = val;
            const videoData = { videoId: videoId, action: 'load', time: 0, timestamp: Date.now(), isSearch: isSearch };
            set(ref(db, `calls/${myId}_${partnerId}/videoState`), videoData);
            set(ref(db, `calls/${partnerId}_${myId}/videoState`), videoData);
        }

        function onPlayerStateChange(event) {
            if (ignoreNextStateChange) return;
            let action = '';
            if (event.data === YT.PlayerState.PLAYING) action = 'play';
            if (event.data === YT.PlayerState.PAUSED) action = 'pause';

            if (action !== '' && action !== lastActionSent) {
                lastActionSent = action;
                const videoState = { action: action, time: ytPlayer.getCurrentTime(), timestamp: Date.now() };
                if (partnerId) {
                    update(ref(db, `calls/${myId}_${partnerId}/videoState`), videoState);
                    update(ref(db, `calls/${partnerId}_${myId}/videoState`), videoState);
                }
            }
        }

        function setupCinemaSync() {
            const listenSync = (callKey) => {
                onValue(ref(db, `calls/${callKey}/videoState`), (snapshot) => {
                    if (!snapshot.exists() || !ytPlayer) return;
                    const data = snapshot.val();
                    ignoreNextStateChange = true;

                    if (data.action === 'load') {
                        if (data.isSearch) {
                            ytPlayer.cuePlaylist({listType: 'search', list: data.videoId, index: 0});
                        } else {
                            ytPlayer.loadVideoById(sanitizeInput(data.videoId), 0);
                        }
                        setTimeout(() => { ignoreNextStateChange = false; }, 1000);
                        return;
                    }

                    const localTime = ytPlayer.getCurrentTime();
                    const diff = Math.abs(localTime - data.time);

                    if (data.action === 'play') {
                        if (diff > 1.5) ytPlayer.seekTo(data.time, true);
                        ytPlayer.playVideo();
                    } else if (data.action === 'pause') {
                        ytPlayer.pauseVideo();
                        if (diff > 1.5) ytPlayer.seekTo(data.time, true);
                    }
                    setTimeout(() => { ignoreNextStateChange = false; }, 500);
                });
            };
            listenSync(`${myId}_${partnerId}`);
        }

        // إرسال رسائل الشات
        document.getElementById('btn-send-msg').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        async function sendChatMessage() {
            const text = sanitizeInput(document.getElementById('chat-input').value);
            if (!text || !partnerId) return;

            const chatRef = ref(db, `chats/${myId}_${partnerId}`);
            const chatPartnerRef = ref(db, `chats/${partnerId}_${myId}`);
            
            const msgData = {
                sender: myName,
                avatar: myAvatar,
                text: text,
                timestamp: Date.now()
            };

            await push(chatRef, msgData);
            await push(chatPartnerRef, msgData);

            document.getElementById('chat-input').value = '';
        }

        function setupChatSync() {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; 
            
            const chatRef = ref(db, `chats/${myId}_${partnerId}`);
            onValue(chatRef, (snapshot) => {
                if (!snapshot.exists()) return;
                chatBox.innerHTML = '';
                snapshot.forEach((child) => {
                    const msg = child.val();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'chat-msg';
                    msgDiv.innerHTML = `
                        <img src="${msg.avatar}" alt="">
                        <div class="chat-msg-body">
                            <div class="chat-msg-name">${msg.sender}</div>
                            <div>${msg.text}</div>
                        </div>
                    `;
                    chatBox.appendChild(msgDiv);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function handleCallStreams(call) {
            call.on('stream', (remoteStream) => {
                showToast("تم الاتصال بنجاح!", "success");
                document.getElementById('calling-state-view').style.display = 'none';
                document.getElementById('cinema-room').style.display = 'flex';
                document.getElementById('remote-audio').srcObject = remoteStream;
            });

            call.on('close', () => {
                showToast("انتهت المكالمة", "danger");
                endCallInterface();
            });
        }

        document.getElementById('btn-hangup').addEventListener('click', async () => {
            if (partnerId) {
                await set(ref(db, `calls/${partnerId}_${myId}/rejected`), true);
                remove(ref(db, `calls/${myId}_${partnerId}`));
                remove(ref(db, `chats/${myId}_${partnerId}`));
            }
            if(currentCall) currentCall.close();
            endCallInterface();
        });

        function endCallInterface() {
            if (callRejectedListener) { callRejectedListener(); callRejectedListener = null; }
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('cinema-room').style.display = 'none';
            document.getElementById('remote-audio').srcObject = null;
            if (ytPlayer) ytPlayer.stopVideo();
            partnerId = null;
        }

        // كتم المايكروفون
        let isMuted = false;
        document.getElementById('btn-mute').addEventListener('click', () => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('btn-mute').classList.toggle('active', isMuted);
        });
    </script>
</body>
</html>
