<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Optima Online Game</title>
    <style>
        body { 
            margin: 0; 
            background-color: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
            font-family: Arial, sans-serif; 
            overflow: hidden;
            touch-action: none; /* ك تمنع الهاتف من تحريك الصفحة ملي تقيس الشاشة */
        }
        canvas { 
            border: 4px solid #fff; 
            background-color: #111; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100vw;
            max-height: 100vh;
        }
        /* تصميم الجويستيك للهاتف */
        #joystick-container {
            position: fixed;
            bottom: 50px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: none; /* كيبان غير يلا تقاست الشاشة */
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            position: absolute;
            touch-action: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- منطقة الجويستيك للموبايل -->
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://optima-game-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playerId = "player_" + Math.floor(Math.random() * 100000);
        const playerRef = ref(db, `players/${playerId}`);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        let myPlayer = { 
            x: Math.floor(Math.random() * 700) + 50, 
            y: Math.floor(Math.random() * 500) + 50, 
            size: 30, 
            color: randomColor 
        };
        
        let allPlayers = {};
        let keys = {};
        
        // متغيرات الجويستيك
        let joystick = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0, vx: 0, vy: 0 };
        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');

        // تحكم PC (الكيبورد)
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // تحكم الهاتف (Touch Events)
        window.addEventListener('touchstart', (e) => {
            // إظهار الجويستيك وتحديد مكان البداية
            joystickContainer.style.display = 'flex';
            joystick.active = true;
            
            // تثبيت مركز الجويستيك ف البلاصة فين حطيتي صبعك أول مرة (أو خليه مكانو الافتراضي)
            const touch = e.touches[0];
            joystick.startX = joystickContainer.offsetLeft + 60;
            joystick.startY = joystickContainer.offsetTop + 60;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            
            // حساب المسافة بين الصبع ومركز الجويستيك
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let maxRadius = 40; // أقصى مسافة يتحركها المحور الداخلي

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            // تحريك الزر الافتراضي ف الشاشة
            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

            // حساب نسبة السرعة (بين -1 و 1)
            joystick.vx = dx / maxRadius;
            joystick.vy = dy / maxRadius;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            joystick.vx = 0;
            joystick.vy = 0;
            joystickKnob.style.transform = `translate(0px, 0px)`;
        });

        onDisconnect(playerRef).remove();

        const playersRef = ref(db, 'players');
        onValue(playersRef, (snapshot) => {
            allPlayers = snapshot.val() || {};
        });

        function update() {
            let moved = false;
            const speed = 5;
            
            // 1. منطق حركة الكيبورد (PC)
            if (keys['arrowup'] || keys['w']) { myPlayer.y -= speed; moved = true; }
            if (keys['arrowdown'] || keys['s']) { myPlayer.y += speed; moved = true; }
            if (keys['arrowleft'] || keys['a']) { myPlayer.x -= speed; moved = true; }
            if (keys['arrowright'] || keys['d']) { myPlayer.x += speed; moved = true; }

            // 2. منطق حركة الجويستيك (الهاتف)
            if (joystick.active && (Math.abs(joystick.vx) > 0.1 || Math.abs(joystick.vy) > 0.1)) {
                myPlayer.x += joystick.vx * speed;
                myPlayer.y += joystick.vy * speed;
                moved = true;
            }

            // حدود الخريطة
            if (myPlayer.x < 0) myPlayer.x = 0;
            if (myPlayer.y < 0) myPlayer.y = 0;
            if (myPlayer.x + myPlayer.size > canvas.width) myPlayer.x = canvas.width - myPlayer.size;
            if (myPlayer.y + myPlayer.size > canvas.height) myPlayer.y = canvas.height - myPlayer.size;

            // تحديث السيرفر
            if (moved) {
                set(playerRef, {
                    x: myPlayer.x,
                    y: myPlayer.y,
                    color: myPlayer.color
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            Object.keys(allPlayers).forEach((id) => {
                const p = allPlayers[id];
                ctx.fillStyle = p.color || '#fff';
                ctx.fillRect(p.x, p.y, myPlayer.size, myPlayer.size);
                
                if (id === playerId) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px Arial';
                    ctx.fillText("أنت", p.x + 2, p.y - 5);
                }
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        set(playerRef, { x: myPlayer.x, y: myPlayer.y, color: myPlayer.color });
        gameLoop();
    </script>
</body>
</html>
