<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Spark: Pixel Heist</title>
    <style>
        body { 
            margin: 0; background-color: #0b0c10; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; touch-action: none;
        }
        #ui-layer {
            position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 5px;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid #1f2833;
            pointer-events: none;
        }
        .role-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; text-align: center; }
        .thief-team { background-color: #1f4068; color: #e43f5a; }
        .guard-team { background-color: #f1b24a; color: #111; }
        canvas { 
            border: 4px solid #1f2833; background-color: #11141a; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); max-width: 100vw; max-height: 100vh;
        }
        #joystick-container {
            position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 50%; display: none; justify-content: center; align-items: center; touch-action: none;
        }
        #joystick-knob { width: 40px; height: 40px; background: rgba(0, 242, 254, 0.6); border-radius: 50%; position: absolute; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="roleDisplay" class="role-badge">جاري تحديد دورك...</div>
        <div id="statusDisplay">انتظر دخول لاعب آخر...</div>
    </div>

    <canvas id="gameCanvas" width="900" height="650"></canvas>

    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://optima-game-default-rtdb.europe-west1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playerId = "player_" + Math.floor(Math.random() * 100000);
        const playerRef = ref(db, `players/${playerId}`);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // عناصر الخريطة
        const diamond = { x: 450, y: 325, size: 20, isStolen: false, stolenBy: null };
        let myRole = 'thief'; // الافتراضي
        let myPlayer = { x: 100, y: 100, size: 25, angle: 0, hasDiamond: false };
        let allPlayers = {};
        let keys = {};
        
        // الجويستيك للموبايل
        let joystick = { active: false, startX: 0, startY: 0, vx: 0, vy: 0 };
        const jContainer = document.getElementById('joystick-container');
        const jKnob = document.getElementById('joystick-knob');

        // تحديد الأدوار ديناميكياً بناءً على عدد المتصلين
        onValue(ref(db, 'players'), (snapshot) => {
            allPlayers = snapshot.val() || {};
            const playerIds = Object.keys(allPlayers);
            
            // إذا كنت أنت أول واحد دخل فالسيرفر -> سارق، الثاني -> حارس
            if (playerIds.includes(playerId)) {
                const myIndex = playerIds.indexOf(playerId);
                myRole = (myIndex % 2 === 0) ? 'thief' : 'guard';
                
                // تغيير إحداثيات البداية حسب الدور
                if (myIndex % 2 !== 0 && myPlayer.x === 100) { // أول مرة للحارس
                    myPlayer.x = 800; myPlayer.y = 550;
                }

                // تحديث واجهة المستخدم UI
                const badge = document.getElementById('roleDisplay');
                badge.textContent = myRole === 'thief' ? "أنت: سارق (Thief)" : "أنت: حارس (Guard)";
                badge.className = `role-badge ${myRole === 'thief' ? 'thief-team' : 'guard-team'}`;
            }

            // تتبع الماسّة أونلاين
            let thiefHolding = null;
            Object.keys(allPlayers).forEach(id => {
                if (allPlayers[id].hasDiamond) thiefHolding = id;
            });
            if (thiefHolding) {
                diamond.isStolen = true;
                diamond.stolenBy = thiefHolding;
                document.getElementById('statusDisplay').textContent = "⚠️ التحفة سرقت! الحارس يجب أن يمسك اللص!";
            } else {
                diamond.isStolen = false;
                diamond.stolenBy = null;
                document.getElementById('statusDisplay').textContent = "الماسّة في مكانها الآمن فالمتحف.";
            }
        });

        onDisconnect(playerRef).remove();

        // التحكم بالكيبورد والماوس
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            myPlayer.angle = Math.atan2(mouseY - myPlayer.y, mouseX - myPlayer.x);
        });

        // دعم اللمس للموبايل
        window.addEventListener('touchstart', (e) => {
            jContainer.style.display = 'flex';
            joystick.active = true;
            joystick.startX = jContainer.offsetLeft + 50;
            joystick.startY = jContainer.offsetTop + 50;
        });
        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
            jKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.vx = dx / 35; joystick.vy = dy / 35;
            myPlayer.angle = Math.atan2(dy, dx);
        });
        window.addEventListener('touchend', () => {
            joystick.active = false; joystick.vx = 0; joystick.vy = 0;
            jKnob.style.transform = `translate(0px, 0px)`;
        });

        function update() {
            let moved = false;
            const speed = myRole === 'thief' ? 4.5 : 4; // السارق أسرع شوية للهروب

            if (keys['arrowup'] || keys['w']) { myPlayer.y -= speed; moved = true; }
            if (keys['arrowdown'] || keys['s']) { myPlayer.y += speed; moved = true; }
            if (keys['arrowleft'] || keys['a']) { myPlayer.x -= speed; moved = true; }
            if (keys['arrowright'] || keys['d']) { myPlayer.x += speed; moved = true; }

            if (joystick.active && (Math.abs(joystick.vx) > 0.1 || Math.abs(joystick.vy) > 0.1)) {
                myPlayer.x += joystick.vx * speed; myPlayer.y += joystick.vy * speed; moved = true;
            }

            // الحدود
            if (myPlayer.x < 15) myPlayer.x = 15; if (myPlayer.y < 15) myPlayer.y = 15;
            if (myPlayer.x > canvas.width - 15) myPlayer.x = canvas.width - 15;
            if (myPlayer.y > canvas.height - 15) myPlayer.y = canvas.height - 15;

            // منطق السارق: محاولة أخذ الماسة
            if (myRole === 'thief' && !diamond.isStolen) {
                let distToDiamond = Math.sqrt(Math.pow(myPlayer.x - diamond.x, 2) + Math.pow(myPlayer.y - diamond.y, 2));
                if (distToDiamond < myPlayer.size + diamond.size) {
                    myPlayer.hasDiamond = true;
                }
            }

            // منطق الحارس: لمس السارق للإمساك به
            if (myRole === 'guard') {
                Object.keys(allPlayers).forEach(id => {
                    if (allPlayers[id].role === 'thief') {
                        let distToThief = Math.sqrt(Math.pow(myPlayer.x - allPlayers[id].x, 2) + Math.pow(myPlayer.y - allPlayers[id].y, 2));
                        if (distToThief < myPlayer.size + 25) {
                            // تم القبض عليه! إعادة تعيين الماسة فالسيرفر
                            alert("👮 الحارس قبض على السارق! انتهت الجولة.");
                            myPlayer.x = 800; myPlayer.y = 550;
                            set(ref(db, `players/${id}/hasDiamond`), false);
                        }
                    }
                });
            }

            // إرسال البيانات المحدثة للفايربيس
            set(playerRef, {
                x: myPlayer.x, y: myPlayer.y, angle: myPlayer.angle,
                role: myRole, hasDiamond: myPlayer.hasDiamond
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. رسم أرضية وجدران المتحف (ستايل بسيط)
            ctx.strokeStyle = '#1f2833'; ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=50) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            // 2. رسم الماسة (إذا لم تُسرق)
            if (!diamond.isStolen) {
                ctx.fillStyle = '#00f2fe'; ctx.shadowColor = '#00f2fe'; ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(diamond.x, diamond.y - diamond.size);
                ctx.lineTo(diamond.x + diamond.size, diamond.y);
                ctx.lineTo(diamond.x, diamond.y + diamond.size);
                ctx.lineTo(diamond.x - diamond.size, diamond.y);
                ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
            }

            // 3. حساب ورسم طبقة الظلام الدامس (Dynamic Lighting)
            // الحارس كيكشف الظلام، بينما السارق كيشوف كولشي عادي ولكن كيرسمو كشافات الحراس
            let guards = [];
            Object.keys(allPlayers).forEach(id => {
                if (allPlayers[id].role === 'guard') guards.push(allPlayers[id]);
            });

            // رسم الظلام فقط إذا كنت سارق (باش تحضي من ضوء الحارس) أو كنت حارس (باش تخدم بكشافك)
            let maskCanvas = document.createElement('canvas');
            maskCanvas.width = canvas.width; maskCanvas.height = canvas.height;
            let mctx = maskCanvas.getContext('2d');
            
            mctx.fillStyle = 'rgba(5, 7, 12, 0.92)'; // درجة عتمة المتحف
            mctx.fillRect(0, 0, canvas.width, canvas.height);

            // فتح بقع الضوء (الكشافات) للحراس
            guards.forEach(g => {
                mctx.save();
                mctx.globalCompositeOperation = 'destination-out';
                let gradient = mctx.createRadialGradient(g.x, g.y, 20, g.x, g.y, 220);
                gradient.addColorStop(0, 'rgba(0,0,0,1)');
                gradient.addColorStop(0.4, 'rgba(0,0,0,0.8)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                
                mctx.fillStyle = gradient;
                mctx.beginPath(); mctx.arc(g.x, g.y, 220, 0, Math.PI*2); mctx.fill();
                mctx.restore();
            });
            
            // تطبيق قناع الظلام فوق الخريطة
            ctx.drawImage(maskCanvas, 0, 0);

            // 4. رسم اللاعبين المتصلين أونلاين
            Object.keys(allPlayers).forEach((id) => {
                const p = allPlayers[id];
                
                // تحديد واش السارق باين ولا مخفي فالظلام
                let isThiefVisible = false;
                if (p.role === 'thief') {
                    // السارق كيبان ديما لراسو، وكيبان للحارس غير يلا قرب من كشاف الحارس
                    if (id === playerId) isThiefVisible = true;
                    guards.forEach(g => {
                        let d = Math.sqrt(Math.pow(p.x - g.x, 2) + Math.pow(p.y - g.y, 2));
                        if (d < 200) isThiefVisible = true; // دخل فمجال الضوء
                    });
                }

                if (p.role === 'guard' || isThiefVisible) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle || 0);

                    if (p.role === 'guard') {
                        // رسم الحارس (مربع ذهبي مع إشارة اتجاه شعلة الضوء)
                        ctx.fillStyle = '#f1b24a'; ctx.fillRect(-15, -15, 30, 30);
                        ctx.fillStyle = '#fff'; ctx.fillRect(10, -4, 8, 8); // الكشاف
                    } else {
                        // رسم السارق (مربع نيون أحمر غامق)
                        ctx.fillStyle = p.hasDiamond ? '#00f2fe' : '#e43f5a'; 
                        ctx.fillRect(-12, -12, 24, 24);
                        ctx.fillStyle = '#111'; ctx.fillRect(2, -8, 4, 4); // قناع العينين
                        ctx.fillRect(2, 4, 4, 4);
                    }
                    ctx.restore();

                    // كتابة الاسم التمييزي
                    ctx.fillStyle = id === playerId ? '#00f2fe' : '#fff';
                    ctx.font = '10px Arial';
                    ctx.fillText(id === playerId ? "أنت" : p.role, p.x - 10, p.y - 20);
                }
            });
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        set(playerRef, { x: myPlayer.x, y: myPlayer.y, angle: myPlayer.angle, role: myRole, hasDiamond: false });
        gameLoop();
    </script>
</body>
</html>
