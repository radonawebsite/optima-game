<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Spark: Hardcore Heist</title>
    <style>
        body { 
            margin: 0; background-color: #05070c; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; font-family: sans-serif; 
            overflow: hidden; touch-action: none;
        }
        #ui-layer {
            position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px;
            background: rgba(11, 12, 16, 0.85); padding: 15px; border-radius: 8px; border: 2px solid #1f2833;
            pointer-events: none; z-index: 10;
        }
        .role-badge { padding: 6px 12px; border-radius: 4px; font-weight: bold; text-align: center; font-size: 14px; }
        .thief-team { background-color: #1f4068; color: #e43f5a; border: 1px solid #e43f5a; }
        .guard-team { background-color: #f1b24a; color: #111; border: 1px solid #111; }
        #statusDisplay { font-size: 12px; color: #c5c6c7; }
        canvas { 
            background-color: #0b0c10; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        #joystick-container {
            position: fixed; bottom: 50px; left: 50px; width: 110px; height: 110px;
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(0, 242, 254, 0.4);
            border-radius: 50%; display: none; justify-content: center; align-items: center; touch-action: none; z-index: 20;
        }
        #joystick-knob { width: 45px; height: 45px; background: rgba(0, 242, 254, 0.7); border-radius: 50%; position: absolute; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="roleDisplay" class="role-badge">جاري التحميل...</div>
        <div id="statusDisplay">انتظر دخول المنافس... الماب كبير جداً، ابحث جيداً!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://optima-game-default-rtdb.europe-west1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playerId = "player_" + Math.floor(Math.random() * 100000);
        const playerRef = ref(db, `players/${playerId}`);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // إعدادات أبعاد شاشة العرض وحجم الماب العملاق
        const VIEW_WIDTH = window.innerWidth;
        const VIEW_HEIGHT = window.innerHeight;
        canvas.width = VIEW_WIDTH;
        canvas.height = VIEW_HEIGHT;

        const MAP_SIZE = 2000; // ماب عملاق جداً 2000x2000
        const diamond = { x: 1000, y: 1000, size: 25, isStolen: false };
        
        let myRole = 'thief';
        let myPlayer = { x: 150, y: 150, size: 22, angle: 0, hasDiamond: false, isMoving: false };
        let allPlayers = {};
        let keys = {};
        
        // الكاميرا لتتبع اللاعب وسط الماب الكبير
        let camera = { x: 0, y: 0 };

        // تصميم جدران المتاهة داخل المتحف الكبير (تحدي حقيقي)
        const walls = [
            {x: 0, y: 0, w: MAP_SIZE, h: 40}, // جدار علوي خارجي
            {x: 0, y: 0, w: 40, h: MAP_SIZE}, // جدار أيسر خارجي
            {x: 0, y: MAP_SIZE-40, w: MAP_SIZE, h: 40}, // جدار سفلي خارجي
            {x: MAP_SIZE-40, y: 0, w: 40, h: MAP_SIZE}, // جدار أيمن خارجي
            
            // جدران داخلية للمتاهة
            {x: 400, y: 40, w: 60, h: 500},
            {x: 400, y: 800, w: 500, h: 60},
            {x: 0, y: 1400, w: 800, h: 60},
            {x: 1200, y: 40, w: 60, h: 700},
            {x: 900, y: 1200, w: 700, h: 60},
            {x: 1400, y: 700, w: 60, h: 700},
            {x: 700, y: 600, w: 60, h: 400}
        ];

        // الموبايل جويستيك
        let joystick = { active: false, startX: 0, startY: 0, vx: 0, vy: 0 };
        const jContainer = document.getElementById('joystick-container');
        const jKnob = document.getElementById('joystick-knob');

        onValue(ref(db, 'players'), (snapshot) => {
            allPlayers = snapshot.val() || {};
            const ids = Object.keys(allPlayers);
            if (ids.includes(playerId)) {
                const idx = ids.indexOf(playerId);
                myRole = (idx % 2 === 0) ? 'thief' : 'guard';
                
                if (idx % 2 !== 0 && myPlayer.x === 150) { 
                    myPlayer.x = 1850; myPlayer.y = 1850; // الحارس يبدأ ف أقصى اليمين تحت
                }

                const badge = document.getElementById('roleDisplay');
                badge.textContent = myRole === 'thief' ? "🔴 أنت: سارق (مخفي فالظلام)" : "🔵 أنت: حارس (ابحث بالضوء والرادار)";
                badge.className = `role-badge ${myRole === 'thief' ? 'thief-team' : 'guard-team'}`;
            }

            // فحص حالة الماسة أونلاين
            let taken = false;
            Object.keys(allPlayers).forEach(id => { if (allPlayers[id].hasDiamond) taken = true; });
            diamond.isStolen = taken;
            if (diamond.isStolen) {
                document.getElementById('statusDisplay').textContent = "⚠️🚨 إنذار!! الماسة سرقت! الحارس يجب أن يمسك اللص فوراً!";
            }
        });

        onDisconnect(playerRef).remove();

        // أحداث التحكم
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', (e) => {
            myPlayer.angle = Math.atan2(e.clientY - VIEW_HEIGHT/2, e.clientX - VIEW_WIDTH/2);
        });

        window.addEventListener('touchstart', (e) => {
            jContainer.style.display = 'flex'; joystick.active = true;
            joystick.startX = jContainer.offsetLeft + 55; joystick.startY = jContainer.offsetTop + 55;
        });
        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const t = e.touches[0];
            let dx = t.clientX - joystick.startX, dy = t.clientY - joystick.startY;
            let d = Math.sqrt(dx*dx + dy*dy);
            if (d > 40) { dx = (dx/d)*40; dy = (dy/d)*40; }
            jKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.vx = dx / 40; joystick.vy = dy / 40;
            myPlayer.angle = Math.atan2(dy, dx);
        });
        window.addEventListener('touchend', () => {
            joystick.active = false; joystick.vx = 0; joystick.vy = 0;
            jKnob.style.transform = `translate(0px, 0px)`;
        });

        // دالة فحص الاصطدام بالجدران ومنع اختراقها (Fix Glitches)
        function checkWallCollision(newX, newY) {
            for (let w of walls) {
                if (newX + myPlayer.size > w.x && newX - myPlayer.size < w.x + w.w &&
                    newY + myPlayer.size > w.y && newY - myPlayer.size < w.y + w.h) {
                    return true; // كاين اصطدام
                }
            }
            return false;
        }

        function update() {
            let dx = 0, dy = 0;
            const speed = myRole === 'thief' ? 5 : 4.5;

            if (keys['arrowup'] || keys['w']) dy = -speed;
            if (keys['arrowdown'] || keys['s']) dy = speed;
            if (keys['arrowleft'] || keys['a']) dx = -speed;
            if (keys['arrowright'] || keys['d']) dx = speed;

            if (joystick.active) { dx = joystick.vx * speed; dy = joystick.vy * speed; }

            myPlayer.isMoving = (dx !== 0 || dy !== 0);

            // تطبيق الحركة مع فحص الحيوط بشكل منفصل (X و Y) لتفادي القلتش
            if (dx !== 0 && !checkWallCollision(myPlayer.x + dx, myPlayer.y)) myPlayer.x += dx;
            if (dy !== 0 && !checkWallCollision(myPlayer.x, myPlayer.y + dy)) myPlayer.y += dy;

            // السارق يسرق الماسة
            if (myRole === 'thief' && !diamond.isStolen) {
                let dist = Math.sqrt(Math.pow(myPlayer.x - diamond.x, 2) + Math.pow(myPlayer.y - diamond.y, 2));
                if (dist < myPlayer.size + diamond.size) myPlayer.hasDiamond = true;
            }

            // الحارس يمسك السارق
            if (myRole === 'guard') {
                Object.keys(allPlayers).forEach(id => {
                    if (allPlayers[id].role === 'thief') {
                        let dist = Math.sqrt(Math.pow(myPlayer.x - allPlayers[id].x, 2) + Math.pow(myPlayer.y - allPlayers[id].y, 2));
                        if (dist < myPlayer.size + 22) {
                            alert("👮 الحارس قبض على السارق بنجاح وتصدى للعملية!");
                            myPlayer.x = 1850; myPlayer.y = 1850;
                            set(ref(db, `players/${id}/hasDiamond`), false);
                            set(ref(db, `players/${id}/x`), 150);
                            set(ref(db, `players/${id}/y`), 150);
                        }
                    }
                });
            }

            // تحديث الكاميرا لتتمحور حول اللاعب ديالي
            camera.x = myPlayer.x - VIEW_WIDTH / 2;
            camera.y = myPlayer.y - VIEW_HEIGHT / 2;

            set(playerRef, {
                x: myPlayer.x, y: myPlayer.y, angle: myPlayer.angle,
                role: myRole, hasDiamond: myPlayer.hasDiamond, isMoving: myPlayer.isMoving
            });
        }

        function draw() {
            ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

            ctx.save();
            // تحريك كل شيء بناءً على الكاميرا المحدثة
            ctx.translate(-camera.x, -camera.y);

            // 1. رسم شبكة الأرضية للمتحف بالكامل
            ctx.strokeStyle = '#112233'; ctx.lineWidth = 1;
            for (let i = 0; i < MAP_SIZE; i += 60) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
            }

            // 2. رسم الجدران الصلبة
            ctx.fillStyle = '#1f2833';
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // 3. رسم الماسة المطلوبة فالمتحف
            if (!diamond.isStolen) {
                ctx.fillStyle = '#00f2fe'; ctx.shadowColor = '#00f2fe'; ctx.shadowBlur = 20;
                ctx.beginPath(); ctx.arc(diamond.x, diamond.y, diamond.size, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 4. سيستيم الإضاءة والظلام الديناميكي (Dynamic Sight)
            let guards = [];
            Object.keys(allPlayers).forEach(id => { if (allPlayers[id].role === 'guard') guards.push(allPlayers[id]); });

            let maskCanvas = document.createElement('canvas');
            maskCanvas.width = MAP_SIZE; maskCanvas.height = MAP_SIZE;
            let mctx = maskCanvas.getContext('2d');
            mctx.fillStyle = 'rgba(4, 5, 8, 0.96)'; // ظلام شديد السواد
            mctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

            // فتح الضوء للكشافات الخاصة بالحراس أونلاين
            guards.forEach(g => {
                mctx.save();
                mctx.globalCompositeOperation = 'destination-out';
                // كشاف متطور وبعيد المدى (280 بكسل) كيكشف المتاهة والسارقين
                let grad = mctx.createRadialGradient(g.x, g.y, 10, g.x, g.y, 280);
                grad.addColorStop(0, 'rgba(0,0,0,1)');
                grad.addColorStop(0.5, 'rgba(0,0,0,0.7)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                mctx.fillStyle = grad;
                mctx.beginPath(); mctx.arc(g.x, g.y, 280, 0, Math.PI*2); mctx.fill();
                mctx.restore();
            });
            ctx.drawImage(maskCanvas, 0, 0);

            // 5. رسم رادار الصوت (أصوات الأقدام) للحارس لمساعدته فالماب الكبير والتحدي الصعب
            if (myRole === 'guard') {
                Object.keys(allPlayers).forEach(id => {
                    const p = allPlayers[id];
                    if (p.role === 'thief' && p.isMoving) {
                        // رسم حلقة رادار حمراء كتعلم الحارس بلي السارق كيجري قريب ليه
                        ctx.strokeStyle = 'rgba(228, 63, 90, 0.4)'; ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 50 + (Math.sin(Date.now()/100)*15), 0, Math.PI*2);
                        ctx.stroke();
                    }
                });
            }

            // 6. رسم اللاعبين أونلاين
            Object.keys(allPlayers).forEach((id) => {
                const p = allPlayers[id];
                let shouldDraw = false;

                if (id === playerId || p.role === 'guard') shouldDraw = true;
                
                // السارق كيبان للحارس غير يلا دخل فمجال الضوء
                if (p.role === 'thief') {
                    guards.forEach(g => {
                        let d = Math.sqrt(Math.pow(p.x - g.x, 2) + Math.pow(p.y - g.y, 2));
                        if (d < 260) shouldDraw = true;
                    });
                }

                if (shouldDraw) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle || 0);

                    if (p.role === 'guard') {
                        ctx.fillStyle = '#f1b24a'; ctx.fillRect(-15, -15, 30, 30); // حارس
                        ctx.fillStyle = '#fff'; ctx.fillRect(12, -4, 6, 8); // مدفع الكشاف
                    } else {
                        ctx.fillStyle = p.hasDiamond ? '#00f2fe' : '#e43f5a'; // سارق
                        ctx.fillRect(-12, -12, 24, 24);
                        ctx.fillStyle = '#111'; ctx.fillRect(3, -6, 3, 3); ctx.fillRect(3, 3, 3, 3);
                    }
                    ctx.restore();

                    ctx.fillStyle = id === playerId ? '#00f2fe' : '#fff';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.fillText(id === playerId ? "أنت" : p.role, p.x - 12, p.y - 22);
                }
            });

            ctx.restore();
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        set(playerRef, { x: myPlayer.x, y: myPlayer.y, angle: myPlayer.angle, role: myRole, hasDiamond: false, isMoving: false });
        // دعم تغيير حجم الشاشة تلقائياً
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        gameLoop();
    </script>
</body>
</html>
